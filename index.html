<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PerkLab — Dead by Daylight</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg-primary: #0a0a0f;
    --bg-secondary: #111118;
    --bg-card: #16161f;
    --bg-card-hover: #1e1e2a;
    --bg-input: #0d0d14;
    --border: #2a2a3a;
    --border-hover: #e8383a;
    --text-primary: #f0ede8;
    --text-secondary: #9a9aaa;
    --text-muted: #555565;
    --accent: #e8383a;
    --accent2: #ff6b35;
    --accent-glow: rgba(232,56,58,0.25);
    --gold: #c9a227;
    --gold-light: #f0c84b;
    --killer-color: #cc3333;
    --survivor-color: #3388cc;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.6);
    --shadow-glow: 0 0 20px rgba(232,56,58,0.3);
    --tier-s: #ff6b35;
    --tier-a: #e8383a;
    --tier-b: #c9a227;
    --tier-c: #6a8fa8;
    --tier-d: #666677;
    --overlay: rgba(0,0,0,0.85);
  }
  :root[data-theme="light"] {
    --bg-primary: #f0ede8;
    --bg-secondary: #e8e4de;
    --bg-card: #ffffff;
    --bg-card-hover: #f8f5f0;
    --bg-input: #fff;
    --border: #d0ccc5;
    --border-hover: #e8383a;
    --text-primary: #1a1a22;
    --text-secondary: #555565;
    --text-muted: #aaa;
    --accent: #e8383a;
    --accent2: #cc5522;
    --accent-glow: rgba(232,56,58,0.15);
    --gold: #a07a10;
    --gold-light: #c9a227;
    --killer-color: #aa2222;
    --survivor-color: #1a66aa;
    --shadow-card: 0 4px 24px rgba(0,0,0,0.1);
    --shadow-glow: 0 0 20px rgba(232,56,58,0.15);
    --tier-s: #ff5500;
    --tier-a: #cc2222;
    --tier-b: #a07a10;
    --tier-c: #3366aa;
    --tier-d: #888;
    --overlay: rgba(0,0,0,0.6);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ===== HEADER ===== */
  header {
    background: var(--bg-secondary);
    border-bottom: 2px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.4);
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--accent);
    text-shadow: 0 0 20px var(--accent-glow);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo span { color: var(--text-primary); }
  .logo-icon { font-size: 24px; }

  .header-controls {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  /* ===== THEME TOGGLE ===== */
  .theme-toggle {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 13px;
    color: var(--text-secondary);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--text-primary); }

  /* ===== TABS ===== */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--bg-card);
    border-radius: 8px;
    padding: 4px;
  }
  .tab-btn {
    padding: 6px 16px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: white; }
  .tab-btn:not(.active):hover { background: var(--bg-card-hover); color: var(--text-primary); }

  /* ===== MAIN LAYOUT ===== */
  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px 20px;
  }

  /* ===== PAGE SECTIONS ===== */
  .page { display: none; }
  .page.active { display: block; }

  /* ===== BUILDER TOP BAR ===== */
  .builder-bar {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .role-switch {
    display: flex;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .role-btn {
    padding: 8px 20px;
    border: none;
    background: var(--bg-card);
    color: var(--text-secondary);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .role-btn.killer.active { background: var(--killer-color); color: white; }
  .role-btn.survivor.active { background: var(--survivor-color); color: white; }
  .role-btn:hover:not(.active) { background: var(--bg-card-hover); }

  .search-input {
    flex: 1;
    min-width: 200px;
    padding: 8px 14px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-muted); }

  select.filter-select {
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    cursor: pointer;
    outline: none;
  }
  select.filter-select:focus { border-color: var(--accent); }
  option { background: var(--bg-secondary); }

  /* ===== BUILDER LAYOUT ===== */
  .builder-layout {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: 20px;
    align-items: start;
  }

  /* ===== PERK GRID ===== */
  .perk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 8px;
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    max-height: 70vh;
    overflow-y: auto;
  }
  .perk-grid::-webkit-scrollbar { width: 6px; }
  .perk-grid::-webkit-scrollbar-track { background: transparent; }
  .perk-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .perk-item {
    position: relative;
    cursor: pointer;
    border-radius: 8px;
    border: 2px solid transparent;
    background: var(--bg-card);
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 6px;
    transition: all 0.15s;
    overflow: hidden;
    user-select: none;
  }
  .perk-item:hover {
    border-color: var(--accent);
    background: var(--bg-card-hover);
    transform: scale(1.05);
    z-index: 5;
  }
  .perk-item.selected {
    border-color: var(--gold);
    background: var(--bg-card-hover);
    box-shadow: 0 0 10px rgba(201,162,39,0.3);
  }
  .perk-item.disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }
  .perk-icon {
    font-size: 28px;
    line-height: 1;
    margin-bottom: 3px;
  }
  .perk-name {
    font-size: 9px;
    font-weight: 700;
    text-align: center;
    color: var(--text-secondary);
    line-height: 1.1;
    letter-spacing: 0.2px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .perk-item .perk-tier-badge {
    position: absolute;
    top: 3px;
    right: 3px;
    font-size: 8px;
    font-weight: 700;
    font-family: 'Bebas Neue', sans-serif;
    padding: 1px 4px;
    border-radius: 3px;
  }
  .tier-S .perk-tier-badge { background: var(--tier-s); color: white; }
  .tier-A .perk-tier-badge { background: var(--tier-a); color: white; }
  .tier-B .perk-tier-badge { background: var(--tier-b); color: #111; }
  .tier-C .perk-tier-badge { background: var(--tier-c); color: white; }
  .tier-D .perk-tier-badge { background: var(--tier-d); color: white; }

  /* ===== BUILD PANEL ===== */
  .build-panel {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: sticky;
    top: 84px;
  }
  .build-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text-primary);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .build-slots {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .perk-slot {
    aspect-ratio: 1;
    background: var(--bg-card);
    border: 2px dashed var(--border);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
    padding: 8px;
  }
  .perk-slot:hover { border-color: var(--accent); }
  .perk-slot.filled { border-style: solid; border-color: var(--gold); }
  .perk-slot .slot-icon { font-size: 36px; margin-bottom: 4px; }
  .perk-slot .slot-name {
    font-size: 10px;
    font-weight: 700;
    text-align: center;
    color: var(--text-secondary);
    line-height: 1.2;
  }
  .perk-slot .slot-empty {
    font-size: 24px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .perk-slot .slot-label {
    font-size: 9px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .perk-slot .remove-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 50%;
    width: 18px;
    height: 18px;
    font-size: 10px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }
  .perk-slot.filled:hover .remove-btn { display: flex; }

  .build-info {
    margin-bottom: 14px;
  }
  .build-name-input {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.2s;
  }
  .build-name-input:focus { border-color: var(--accent); }

  .build-actions {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .btn {
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-primary {
    background: var(--accent);
    color: white;
  }
  .btn-primary:hover { background: #c82a2c; box-shadow: 0 4px 12px var(--accent-glow); }
  .btn-secondary {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
  }
  .btn-secondary:hover { border-color: var(--accent); color: var(--text-primary); }
  .btn-gold {
    background: var(--gold);
    color: #111;
  }
  .btn-gold:hover { background: var(--gold-light); }
  .btn-danger {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn-danger:hover { background: var(--accent); color: white; }

  /* ===== TOOLTIP ===== */
  .perk-item:hover .perk-tooltip,
  .perk-slot.filled:hover .perk-tooltip { display: block; }
  .perk-tooltip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-primary);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    width: 220px;
    z-index: 999;
    box-shadow: var(--shadow-card);
    pointer-events: none;
  }
  .tooltip-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 1px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .tooltip-origin {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 6px;
    font-style: italic;
  }
  .tooltip-desc {
    font-size: 11px;
    color: var(--text-secondary);
    line-height: 1.5;
  }
  .tooltip-tier {
    margin-top: 6px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Bebas Neue', sans-serif;
    letter-spacing: 1px;
  }

  /* ===== PROFILES PAGE ===== */
  .profiles-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 3px;
    color: var(--text-primary);
  }
  .profiles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }
  .profile-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    transition: all 0.2s;
    cursor: pointer;
  }
  .profile-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-glow); }
  .profile-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .profile-card-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 1px;
  }
  .role-badge {
    padding: 3px 10px;
    border-radius: 50px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .role-badge.killer { background: rgba(204,51,51,0.2); color: var(--killer-color); border: 1px solid var(--killer-color); }
  .role-badge.survivor { background: rgba(51,136,204,0.2); color: var(--survivor-color); border: 1px solid var(--survivor-color); }
  .profile-perks-preview {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
  }
  .mini-perk {
    width: 48px;
    height: 48px;
    background: var(--bg-secondary);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border: 1px solid var(--border);
  }
  .mini-perk.empty { opacity: 0.3; }
  .profile-card-actions {
    display: flex;
    gap: 8px;
  }
  .profile-card-actions .btn { flex: 1; padding: 7px 10px; font-size: 12px; }

  /* ===== TIERLIST ===== */
  .tierlist-header {
    display: flex;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
    align-items: center;
  }
  .tier-row {
    display: flex;
    gap: 0;
    margin-bottom: 8px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .tier-label {
    width: 60px;
    min-width: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .tier-S .tier-label { background: var(--tier-s); color: white; }
  .tier-A .tier-label { background: var(--tier-a); color: white; }
  .tier-B .tier-label { background: var(--tier-b); color: #111; }
  .tier-C .tier-label { background: var(--tier-c); color: white; }
  .tier-D .tier-label { background: var(--tier-d); color: white; }
  .tier-content {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
    background: var(--bg-secondary);
    min-height: 60px;
  }
  .tier-perk-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px 4px 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: default;
    transition: border-color 0.15s;
  }
  .tier-perk-chip:hover { border-color: var(--accent); }
  .tier-perk-chip .chip-icon { font-size: 18px; }

  /* ===== CHAMP MODE ===== */
  .champ-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
  .champ-team-card {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .champ-team-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .player-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px;
    background: var(--bg-card);
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
  }
  .player-num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--text-muted);
    width: 24px;
  }
  .player-name-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    outline: none;
  }
  .player-name-input::placeholder { color: var(--text-muted); }
  .player-perks-mini {
    display: flex;
    gap: 4px;
  }
  .mini-slot {
    width: 36px;
    height: 36px;
    background: var(--bg-secondary);
    border-radius: 6px;
    border: 1px dashed var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .mini-slot.filled { border-style: solid; border-color: var(--gold); }
  .mini-slot:hover { border-color: var(--accent); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--overlay);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    max-width: 500px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: var(--shadow-card);
  }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .modal-perks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
    gap: 8px;
    margin-bottom: 16px;
    max-height: 50vh;
    overflow-y: auto;
  }
  .modal-search {
    width: 100%;
    padding: 8px 12px;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text-primary);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .modal-search:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 16px; margin-bottom: 16px; }

  /* ===== STATS BAR ===== */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: var(--bg-secondary);
    border-radius: 10px;
    border: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    flex-direction: column;

    border-radius: 20px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-secondary);
    margin-left: 6px;
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--bg-card);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 12px 20px;
    font-weight: 600;
    font-size: 14px;
    color: var(--text-primary);
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #toast.show { transform: translateY(0); opacity: 1; }

  @media (max-width: 900px) {
    .builder-layout { grid-template-columns: 1fr; }
    .champ-grid { grid-template-columns: 1fr; }
    .build-panel { position: static; }
    .perk-grid { max-height: 50vh; }
  }
  @media (max-width: 600px) {
    header { padding: 0 12px; height: auto; min-height: 64px; flex-wrap: wrap; gap: 8px; padding: 10px 12px; }

    .main { padding: 12px; }

function toggleTheme() {
  theme = theme === 'dark' ? 'light' : 'dark';
  localStorage.setItem('dbdTheme', theme);
  applyTheme(theme);
}
function applyTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeIcon').textContent = t === 'dark' ? '☀️' : '🌙';
  document.getElementById('themeText').textContent = t === 'dark' ? 'Claro' : 'Escuro';
}

// ==========================================
// PAGES
// ==========================================
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', ['builder','profiles','tierlist','champ'][i] === page);
  });
  if (page === 'profiles') renderProfiles();
  if (page === 'tierlist') renderTierList();
  if (page === 'champ') renderChamp();
}

// ==========================================
// ROLE
// ==========================================
function setRole(role) {
  currentRole = role;
  currentBuild = [null, null, null, null];
  document.getElementById('btnKiller').classList.toggle('active', role === 'killer');
  document.getElementById('btnSurvivor').classList.toggle('active', role === 'survivor');
  document.getElementById('roleLabel').textContent = role.toUpperCase();
  buildCharFilter();
  filterPerks();
  renderBuildSlots();
}

// ==========================================
// CHAR FILTER
// ==========================================
function buildCharFilter() {
  const sel = document.getElementById('charFilter');
  const perks = PERKS_DATA[currentRole];
  const chars = [...new Set(perks.map(p => p.char))].sort();
  sel.innerHTML = '<option value="">Todos os personagens</option>';
  chars.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c; opt.textContent = c;
    sel.appendChild(opt);
  });
}

// ==========================================
// PERK GRID
// ==========================================
function filterPerks() {
  renderPerkGrid();
}

function renderPerkGrid() {
  const grid = document.getElementById('perkGrid');
  const search = document.getElementById('perkSearch').value.toLowerCase();
  const charF = document.getElementById('charFilter').value;
  const tierF = document.getElementById('tierFilter').value;
  const perks = PERKS_DATA[currentRole];

  const filtered = perks.filter(p => {
    const matchSearch = !search || p.name.toLowerCase().includes(search) || p.char.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search);
    const matchChar = !charF || p.char === charF;
    const matchTier = !tierF || p.tier === tierF;
    return matchSearch && matchChar && matchTier;
  });

  document.getElementById('perkCount').textContent = filtered.length;
  document.getElementById('selectedCount').textContent = currentBuild.filter(Boolean).length + '/4';

  grid.innerHTML = '';
  filtered.forEach(p => {
    const selected = currentBuild.includes(p.id);
    const full = currentBuild.filter(Boolean).length >= 4 && !selected;
    const div = document.createElement('div');
    div.className = `perk-item tier-${p.tier} ${selected ? 'selected' : ''} ${full ? 'disabled' : ''}`;
    div.innerHTML = `
      <div class="perk-icon">${p.icon}</div>
      <div class="perk-name">${p.name}</div>
      <span class="perk-tier-badge">${p.tier}</span>
      <div class="perk-tooltip">
        <div class="tooltip-name">${p.name}</div>
        <div class="tooltip-origin">📌 ${p.char}</div>
        <div class="tooltip-desc">${p.desc}</div>
        <div class="tooltip-tier" style="color:var(--tier-${p.tier})">TIER ${p.tier}</div>
      </div>
    `;
    if (!full) div.onclick = () => togglePerk(p.id);
    grid.appendChild(div);
  });
}

function togglePerk(id) {
  const idx = currentBuild.indexOf(id);
  if (idx >= 0) {
    currentBuild[idx] = null;
  } else {
    const empty = currentBuild.indexOf(null);
    if (empty >= 0) currentBuild[empty] = id;
    else { toast('Build já está cheio! Remova um perk.'); return; }
  }
  renderBuildSlots();
  renderPerkGrid();
}

// ==========================================
// BUILD SLOTS
// ==========================================
function renderBuildSlots() {
  const slots = document.getElementById('buildSlots');
  const perks = PERKS_DATA[currentRole];
  slots.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const perkId = currentBuild[i];
    const perk = perkId ? perks.find(p => p.id === perkId) : null;
    const div = document.createElement('div');
    div.className = `perk-slot ${perk ? 'filled' : ''}`;
    if (perk) {
      div.innerHTML = `
        <div class="slot-icon">${perk.icon}</div>
        <div class="slot-name">${perk.name}</div>
        <button class="remove-btn" onclick="removePerk(${i})">✕</button>
        <div class="perk-tooltip">
          <div class="tooltip-name">${perk.name}</div>
          <div class="tooltip-origin">📌 ${perk.char}</div>
          <div class="tooltip-desc">${perk.desc}</div>
        </div>
      `;
    } else {
      div.innerHTML = `<div class="slot-empty">＋</div><div class="slot-label">Slot ${i+1}</div>`;
      div.onclick = () => { /* open perk grid */ };
    }
    slots.appendChild(div);
  }
}

function removePerk(index) {
  currentBuild[index] = null;
  renderBuildSlots();
  renderPerkGrid();
}

// ==========================================
// SAVE/LOAD BUILDS
// ==========================================
function saveBuild() {
  const name = document.getElementById('buildName').value.trim() || `Build ${Date.now()}`;
  if (currentBuild.filter(Boolean).length === 0) {
    toast('Adicione pelo menos 1 perk!');
    return;
  }
  const profile = {
    id: Date.now(),
    name,
    role: currentRole,
    perks: [...currentBuild],
    created: new Date().toLocaleDateString('pt-BR')
  };
  profiles.unshift(profile);
  localStorage.setItem('dbdProfiles', JSON.stringify(profiles));
  toast('✅ Perfil salvo com sucesso!');
}

function loadProfile(id) {
  const p = profiles.find(pr => pr.id === id);
  if (!p) return;
  setRole(p.role);
  currentBuild = [...p.perks];
  document.getElementById('buildName').value = p.name;
  renderBuildSlots();
  renderPerkGrid();
  showPage('builder');
  toast('Perfil carregado!');
}

function deleteProfile(id) {
  profiles = profiles.filter(p => p.id !== id);
  localStorage.setItem('dbdProfiles', JSON.stringify(profiles));
  renderProfiles();
  toast('Perfil deletado.');
}

function renderProfiles() {
  const grid = document.getElementById('profilesGrid');
  if (profiles.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="empty-icon">📂</div>
      <p>Nenhum perfil salvo ainda.</p>
      <button class="btn btn-primary" onclick="showPage('builder')">➕ Criar Build</button>
    </div>`;
    return;
  }
  const perksAll = [...PERKS_DATA.killer, ...PERKS_DATA.survivor];
  grid.innerHTML = '';
  profiles.forEach(p => {
    const card = document.createElement('div');
    card.className = 'profile-card';
    const perksPreview = p.perks.map(id => {
      const perk = perksAll.find(pk => pk.id === id);
      return `<div class="mini-perk ${perk ? '' : 'empty'}">${perk ? perk.icon : '＋'}</div>`;
    }).join('');
    card.innerHTML = `
      <div class="profile-card-header">
        <div class="profile-card-name">${p.name}</div>
        <span class="role-badge ${p.role}">${p.role === 'killer' ? '💀 Killer' : '🏃 Survivor'}</span>
      </div>
      <div class="profile-perks-preview">${perksPreview}</div>
      <div style="font-size:11px;color:var(--text-muted);margin-bottom:10px;">📅 ${p.created}</div>
      <div class="profile-card-actions">
        <button class="btn btn-secondary" onclick="loadProfile(${p.id})">✏️ Editar</button>
        <button class="btn btn-danger" onclick="deleteProfile(${p.id})">🗑️</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ==========================================
// TIER LIST
// ==========================================
function setTierRole(role) {
  tierRole = role;
  document.getElementById('tierKillerBtn').classList.toggle('active', role === 'killer');
  document.getElementById('tierSurvivorBtn').classList.toggle('active', role === 'survivor');
  renderTierList();
}

function renderTierList() {
  const container = document.getElementById('tierListContainer');
  const search = document.getElementById('tierSearch').value.toLowerCase();
  const perks = PERKS_DATA[tierRole];
  const tiers = ['S','A','B','C','D'];
  container.innerHTML = '';
  tiers.forEach(tier => {
    const tierPerks = perks.filter(p => p.tier === tier && (!search || p.name.toLowerCase().includes(search) || p.char.toLowerCase().includes(search)));
    if (tierPerks.length === 0) return;
    const row = document.createElement('div');
    row.className = `tier-row tier-${tier}`;
    row.innerHTML = `<div class="tier-label">${tier}</div>
      <div class="tier-content">
        ${tierPerks.map(p => `
          <div class="tier-perk-chip" title="${p.desc}">
            <span class="chip-icon">${p.icon}</span>
            <span>${p.name}</span>
            <span style="color:var(--text-muted);font-size:10px;margin-left:2px">(${p.char})</span>
          </div>
        `).join('')}
      </div>`;
    container.appendChild(row);
  });
}

// ==========================================
// CHAMPIONSHIP
// ==========================================
function renderChamp() {
  renderKillerChamp();
  renderSurvivorChamp();
}

function renderKillerChamp() {
  const container = document.getElementById('killerTeam');
  const k = champData.killer[0];
  const perks = PERKS_DATA.killer;
  container.innerHTML = `
    <div class="player-row">
      <div class="player-num">K</div>
      <input class="player-name-input" placeholder="Nome do Killer..." value="${k.name}" 
             oninput="champData.killer[0].name=this.value;saveChamp()">
      <div class="player-perks-mini">
        ${[0,1,2,3].map(i => {
          const perk = k.perks[i] ? perks.find(p => p.id === k.perks[i]) : null;
          return `<div class="mini-slot ${perk ? 'filled' : ''}" 
                       onclick="openChampModal('killer',0,${i})" 
                       title="${perk ? perk.name : 'Adicionar perk'}">
            ${perk ? perk.icon : '＋'}
          </div>`;
        }).join('')}
      </div>
    </div>
  `;
}

function renderSurvivorChamp() {
  const container = document.getElementById('survivorTeam');
  const perks = PERKS_DATA.survivor;
  container.innerHTML = champData.survivors.map((s, idx) => `
    <div class="player-row">
      <div class="player-num">${idx+1}</div>
      <input class="player-name-input" placeholder="Survivor ${idx+1}..." value="${s.name}"
             oninput="champData.survivors[${idx}].name=this.value;saveChamp()">
      <div class="player-perks-mini">
        ${[0,1,2,3].map(i => {
          const perk = s.perks[i] ? perks.find(p => p.id === s.perks[i]) : null;
          return `<div class="mini-slot ${perk ? 'filled' : ''}" 
                       onclick="openChampModal('survivor',${idx},${i})"
                       title="${perk ? perk.name : 'Adicionar perk'}">
            ${perk ? perk.icon : '＋'}
          </div>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function openChampModal(role, playerIdx, slotIdx) {
  modalSlotIndex = { role, playerIdx, slotIdx };
  const perks = PERKS_DATA[role === 'killer' ? 'killer' : 'survivor'];
  renderModalGrid(perks);
  document.getElementById('modalTitle').textContent = `Selecionar Perk — ${role === 'killer' ? '💀 Killer' : '🏃 Survivor'}`;
  document.getElementById('modalSearch').value = '';
  document.getElementById('modalOverlay').classList.add('open');
}

function renderModalGrid(perks, filter = '') {
  const grid = document.getElementById('modalGrid');
  const filtered = filter ? perks.filter(p => p.name.toLowerCase().includes(filter) || p.char.toLowerCase().includes(filter)) : perks;
  grid.innerHTML = filtered.map(p => `
    <div class="perk-item tier-${p.tier}" onclick="selectChampPerk('${p.id}')" style="cursor:pointer">
      <div class="perk-icon">${p.icon}</div>
      <div class="perk-name">${p.name}</div>
      <span class="perk-tier-badge">${p.tier}</span>
    </div>
  `).join('');
}

function filterModal() {
  const search = document.getElementById('modalSearch').value.toLowerCase();
  if (!modalSlotIndex) return;
  const role = modalSlotIndex.role === 'killer' ? 'killer' : 'survivor';
  renderModalGrid(PERKS_DATA[role], search);
}

function selectChampPerk(id) {
  if (!modalSlotIndex) return;
  const { role, playerIdx, slotIdx } = modalSlotIndex;
  if (role === 'killer') {
    champData.killer[0].perks[slotIdx] = id;
  } else {
    champData.survivors[playerIdx].perks[slotIdx] = id;
  }
  saveChamp();
  closeModal();
  renderChamp();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalSlotIndex = null;
}

function saveChamp() {
  localStorage.setItem('dbdChamp', JSON.stringify(champData));
}

function clearChamp() {
  champData = {
    killer: [{ name:'', perks:[null,null,null,null] }],
    survivors: Array.from({length:4}, () => ({ name:'', perks:[null,null,null,null] }))
  };
  saveChamp();
  renderChamp();
  toast('Campeonato limpo!');
}

function exportChamp() {
  const perksK = PERKS_DATA.killer;
  const perksS = PERKS_DATA.survivor;
  const k = champData.killer[0];
  let text = `🏆 CAMPEONATO DBD\n\n`;
  text += `💀 KILLER: ${k.name || 'N/A'}\n`;
  k.perks.forEach((id, i) => {
    const p = perksK.find(pk => pk.id === id);
    text += `  Perk ${i+1}: ${p ? p.name : '(vazio)'}\n`;
  });
  text += `\n🏃 SURVIVORS:\n`;
  champData.survivors.forEach((s, i) => {
    text += `\n  ${i+1}. ${s.name || 'N/A'}\n`;
    s.perks.forEach((id, j) => {
      const p = perksS.find(pk => pk.id === id);
      text += `    Perk ${j+1}: ${p ? p.name : '(vazio)'}\n`;
    });
  });
  navigator.clipboard.writeText(text).then(() => toast('📋 Campeonato copiado!'));
}

// ==========================================
// RANDOM BUILD
// ==========================================
function randomBuild() {
  const perks = PERKS_DATA[currentRole];
  const shuffled = [...perks].sort(() => Math.random() - 0.5);
  currentBuild = shuffled.slice(0, 4).map(p => p.id);
  renderBuildSlots();
  renderPerkGrid();
  toast('🎲 Build aleatório gerado!');
}

// ==========================================
// EXPORT BUILD
// ==========================================
function exportBuild() {
  const name = document.getElementById('buildName').value || 'Build';
  const perks = PERKS_DATA[currentRole];
  const selected = currentBuild.filter(Boolean).map(id => perks.find(p => p.id === id)).filter(Boolean);
  if (selected.length === 0) { toast('Nenhum perk selecionado!'); return; }
  let text = `🩸 ${name} (${currentRole.toUpperCase()})\n\n`;
  selected.forEach((p, i) => {
    text += `${i+1}. ${p.icon} ${p.name} [${p.char}] — Tier ${p.tier}\n`;
    text += `   ${p.desc}\n\n`;
  });
  navigator.clipboard.writeText(text).then(() => toast('📋 Build copiado!'));
}

// ==========================================
// CLEAR BUILD
// ==========================================
function clearBuild() {
  currentBuild = [null, null, null, null];
  document.getElementById('buildName').value = '';
  renderBuildSlots();
  renderPerkGrid();
}

// ==========================================
// TOAST
// ==========================================
function toast(msg) {
  const el = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
